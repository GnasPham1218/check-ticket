services:
  - type: web
    name: check-ticket
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: STORAGE_DRIVER
        value: sqlite
      - key: XOSO_API_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
