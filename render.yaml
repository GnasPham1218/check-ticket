services:
  - type: web
    name: check-ticket
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: STORAGE_DRIVER
        value: tidb
      - key: TIDB_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
